name: 🚀 Deploy PHP Backend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'php-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy PHP Backend via FTP
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: 📦 Install Composer Dependencies
        working-directory: php-backend
        run: |
          composer install \
            --no-dev \
            --optimize-autoloader \
            --no-interaction \
            --prefer-dist

      - name: 🔧 Create production .env (Hardcoded)
        working-directory: php-backend
        run: |
          cat > .env << ENVEOF
          DB_HOST=localhost
          DB_PORT=3306
          DB_NAME=u882069120_bhakthanivas
          DB_USER=u882069120_bhakthanivas
          DB_PASS=Sandanithin@2026
          APP_ENV=production
          BASE_URL=https://bhakthanivas.com
          JWT_SECRET=mantralayam_jwt_secret_2026
          JWT_EXPIRY=86400
          RAZORPAY_KEY_ID=rzp_test_SDLqt0o7HljyuM
          RAZORPAY_KEY_SECRET=bnLv8KJimr65X4TRIEvSOuYg
          SMTP_HOST=smtp.hostinger.com
          SMTP_PORT=465
          SMTP_EMAIL=info@bhakthanivas.com
          SMTP_PASSWORD=Sandanithin@2026
          ADMIN_EMAIL=info@bhakthanivas.com
          ENVEOF

      - name: 📡 Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 145.79.213.144
          username: u882069120
          password: Sandanithin@2026
          local-dir: ./php-backend/
          server-dir: /public_html/api/
          exclude: |
            **/.git*
            **/.git*/**
