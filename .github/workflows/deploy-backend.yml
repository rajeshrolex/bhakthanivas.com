name: 🚀 Deploy PHP Backend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'php-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Deploy PHP Backend via FTP
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ─────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Set up PHP ────────────────────────────────────────────────────
      - name: 🐘 Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      # ── 3. Install Composer dependencies ────────────────────────────────
      - name: 📦 Install Composer Dependencies
        working-directory: php-backend
        run: |
          composer install \
            --no-dev \
            --optimize-autoloader \
            --no-interaction \
            --prefer-dist \
            --no-audit

      # ── 4. Create production .env ────────────────────────────────────────
      - name: 🔧 Create production .env
        working-directory: php-backend
        run: |
          cat > .env << ENVEOF
          DB_HOST=localhost
          DB_PORT=3306
          DB_NAME=u882069120_bhakthanivas
          DB_USER=u882069120_bhakthanivas
          DB_PASS=${{ secrets.DB_PASS }}
          APP_ENV=production
          BASE_URL=https://palegoldenrod-beaver-753826.hostingersite.com
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRY=86400
          RAZORPAY_KEY_ID=rzp_test_SDLqt0o7HljyuM
          RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
          SMTP_HOST=smtp.hostinger.com
          SMTP_PORT=465
          SMTP_EMAIL=info@bhakthanivas.com
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          ADMIN_EMAIL=info@bhakthanivas.com
          ENVEOF

      # ── 5. Deploy to Hostinger via FTP ───────────────────────────────────
      - name: 📡 Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 145.79.213.144
          username: u882069120.deeppink-aardvark-943779.hostingersite.com
          password: Sandanithin@2026
          local-dir: ./php-backend/
          server-dir: /public_html/api/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.log
            **/test-*.php
