name: 🚀 Deploy Full Stack to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ══════════════════════════════════════════════════════════════════════
  # JOB 1 – Build & Deploy React Frontend
  # ══════════════════════════════════════════════════════════════════════
  deploy-frontend:
    name: 🌐 Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install npm Dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔨 Build Vite React App
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: 📡 FTP Upload Frontend → /public_html/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

  # ══════════════════════════════════════════════════════════════════════
  # JOB 2 – Install & Deploy PHP Backend
  # ══════════════════════════════════════════════════════════════════════
  deploy-backend:
    name: 🐘 Deploy PHP Backend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: 📦 Composer Install (no-dev, optimized)
        working-directory: php-backend
        run: |
          composer install \
            --no-dev \
            --optimize-autoloader \
            --no-interaction \
            --prefer-dist

      - name: 🔧 Write Production .env
        working-directory: php-backend
        run: |
          cat > .env << 'ENVEOF'
          DB_HOST=localhost
          DB_PORT=3306
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          APP_ENV=production
          BASE_URL=${{ secrets.BASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRY=86400
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_EMAIL=${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ENVEOF

      - name: 📡 FTP Upload Backend → /public_html/api/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./php-backend/
          server-dir: /public_html/api/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.log
            **/test-*.php
