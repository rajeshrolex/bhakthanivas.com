name: 🚀 Deploy Full Stack to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ══════════════════════════════════════════════════════════════════════
  # JOB 1 – Build & Deploy React Frontend
  # ══════════════════════════════════════════════════════════════════════
  deploy-frontend:
    name: 🌐 Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install npm Dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔨 Build Vite React App
        working-directory: frontend
        env:
          VITE_API_URL: https://palegoldenrod-beaver-753826.hostingersite.com/api
        run: npm run build

      - name: 📡 FTP Upload Frontend → /public_html/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 145.79.213.144
          username: u882069120.deeppink-aardvark-943779.hostingersite.com
          password: Sandanithin@2026
          local-dir: ./frontend/dist/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

  # ══════════════════════════════════════════════════════════════════════
  # JOB 2 – Install & Deploy PHP Backend
  # ══════════════════════════════════════════════════════════════════════
  deploy-backend:
    name: 🐘 Deploy PHP Backend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: 📦 Composer Install (no-dev, optimized)
        working-directory: php-backend
        run: |
          composer install \
            --no-dev \
            --optimize-autoloader \
            --no-interaction \
            --prefer-dist

      - name: 🔧 Write Production .env
        working-directory: php-backend
        run: |
          cat > .env << ENVEOF
          DB_HOST=localhost
          DB_PORT=3306
          DB_NAME=u882069120_bhakthanivas
          DB_USER=u882069120_bhakthanivas
          DB_PASS=${{ secrets.DB_PASS }}
          APP_ENV=production
          BASE_URL=https://palegoldenrod-beaver-753826.hostingersite.com
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRY=86400
          RAZORPAY_KEY_ID=rzp_test_SDLqt0o7HljyuM
          RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
          SMTP_HOST=smtp.hostinger.com
          SMTP_PORT=465
          SMTP_EMAIL=info@bhakthanivas.com
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          ADMIN_EMAIL=info@bhakthanivas.com
          ENVEOF

      - name: 📡 FTP Upload Backend → /public_html/api/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 145.79.213.144
          username: u882069120.deeppink-aardvark-943779.hostingersite.com
          password: Sandanithin@2026
          local-dir: ./php-backend/
          server-dir: /public_html/api/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.log
            **/test-*.php
