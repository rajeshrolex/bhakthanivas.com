name: 🌐 Deploy Frontend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  build-and-deploy:
    name: Build React App & Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ─────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ────────────────────────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: 📦 Install npm Dependencies
        working-directory: frontend
        run: npm ci

      # ── 4. Build Vite app ────────────────────────────────────────────────
      - name: 🔨 Build React App (Vite)
        working-directory: frontend
        env:
          VITE_API_URL: https://palegoldenrod-beaver-753826.hostingersite.com/api
        run: npm run build

      # ── 5. Deploy dist/ to Hostinger ────────────────────────────────────
      - name: 📡 Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 145.79.213.144
          username: u882069120.deeppink-aardvark-943779.hostingersite.com
          password: Sandanithin@2026
          local-dir: ./frontend/dist/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
