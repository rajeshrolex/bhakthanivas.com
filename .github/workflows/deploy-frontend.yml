name: 🚀 Deploy Frontend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Frontend via FTP
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install npm Dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔨 Build Vite React App
        working-directory: frontend
        env:
          VITE_API_URL: https://deeppink-aardvark-943779.hostingersite.com/api
        run: npm run build

      - name: 📡 Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 145.79.213.144
          username: u882069120.deeppink-aardvark-943779.hostingersite.com
          password: Sandanithin@2026
          local-dir: ./frontend/dist/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
